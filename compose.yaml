services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 15s
      timeout: 5s
      retries: 10

  synapse-generate:
    image: ghcr.io/element-hq/synapse:${SYNAPSE_TAG:-v1.155.0}
    profiles: ["generate"]
    environment:
      SYNAPSE_SERVER_NAME: ${SERVER_NAME}
      SYNAPSE_REPORT_STATS: ${SYNAPSE_REPORT_STATS:-no}
      TZ: ${TZ:-UTC}
    volumes:
      - ./synapse/data:/data
    command: generate

  synapse:
    image: ghcr.io/element-hq/synapse:${SYNAPSE_TAG:-v1.155.0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      TZ: ${TZ:-UTC}
    volumes:
      - ./synapse/data:/data
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  cinny:
    # SelfMatrix fork image (bundles the forked element-call embedded build).
    # Built by the fork's CI: https://github.com/zoobookfool/selfmatrix-cinny
    # The fallback is an intentionally reviewed commit image. Do not use a moving `latest` tag here.
    image: ${CINNY_IMAGE:-ghcr.io/zoobookfool/selfmatrix-cinny}:${CINNY_TAG:-sha-4197034}
    restart: unless-stopped
    volumes:
      - ./cinny/config.json:/app/config.json:ro

  synapse-admin:
    # Moderation dashboard (react-admin SPA served by nginx; no backend logic of
    # its own). Off by default: start explicitly with
    #   docker compose --profile admin up -d synapse-admin
    # NEVER expose this port to the internet — the Caddyfile blocks
    # /_synapse/admin at the edge (docs/operations.md §4), and the browser
    # opening this dashboard must reach Synapse's /_matrix and /_synapse/admin
    # directly, so only bind it to a private interface (Tailscale IP, SSH
    # tunnel, or localhost). See docs/operations.md "moderation dashboard".
    image: awesometechnologies/synapse-admin:${SYNAPSE_ADMIN_TAG:-0.11.4}
    profiles: ["admin"]
    restart: unless-stopped
    volumes:
      - ./synapse-admin/config.json:/app/config.json:ro
    ports:
      - "${SYNAPSE_ADMIN_BIND:-127.0.0.1:8083}:80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - synapse
      - cinny
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
      MATRIX_HOST: ${MATRIX_HOST}
      CHAT_HOST: ${CHAT_HOST}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

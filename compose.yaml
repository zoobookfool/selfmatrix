services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 15s
      timeout: 5s
      retries: 10

  synapse-generate:
    image: ghcr.io/element-hq/synapse:${SYNAPSE_TAG:-latest}
    profiles: ["generate"]
    environment:
      SYNAPSE_SERVER_NAME: ${SERVER_NAME}
      SYNAPSE_REPORT_STATS: ${SYNAPSE_REPORT_STATS:-no}
      TZ: ${TZ:-UTC}
    volumes:
      - ./synapse/data:/data
    command: generate

  synapse:
    image: ghcr.io/element-hq/synapse:${SYNAPSE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      TZ: ${TZ:-UTC}
    volumes:
      - ./synapse/data:/data
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  cinny:
    image: ghcr.io/cinnyapp/cinny:${CINNY_TAG:-latest}
    restart: unless-stopped
    volumes:
      - ./cinny/config.json:/app/config.json:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - synapse
      - cinny
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
      MATRIX_HOST: ${MATRIX_HOST}
      CHAT_HOST: ${CHAT_HOST}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
